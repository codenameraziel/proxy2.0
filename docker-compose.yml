version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    networks:
      - openclaw-net
    restart: unless-stopped

  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    ports:
      - "18789:18789"
      - "8080:8080"
    volumes:
      - ./config:/app/config
    networks:
      - openclaw-net
    restart: unless-stopped

  ollama-proxy:
    build: ./proxy
    container_name: ollama-proxy
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    networks:
      - openclaw-net
    restart: unless-stopped

networks:
  openclaw-net:
    driver: bridge
